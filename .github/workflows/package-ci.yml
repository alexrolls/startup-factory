name: Package CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Runtime, package, and reproducible artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out the tested commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Run the full runtime suite
        shell: bash
        run: |
          set -euo pipefail
          runtime_tmp="$RUNNER_TEMP/startup-factory-runtime"
          install -d -m 700 "$runtime_tmp"
          /usr/bin/python3 -c 'import sys; assert sys.version_info >= (3, 10)'
          PATH="/usr/bin:/bin" TMPDIR="$runtime_tmp" /bin/bash tests/run-all.sh

      - name: Run packaging unit tests
        run: python -m unittest discover -s tests/packaging -p "test_*.py" -v

      - name: Read the package version
        id: package
        shell: bash
        run: |
          version="$(python -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build the source bundle twice
        env:
          VERSION: ${{ steps.package.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          mkdir -p build/repro-a build/repro-b
          python packaging/build_bundle.py \
            --repo . \
            --commit "$commit" \
            --version "$VERSION" \
            --output "build/repro-a/startup-factory-$VERSION.tar.gz"
          python packaging/build_bundle.py \
            --repo . \
            --commit "$commit" \
            --version "$VERSION" \
            --output "build/repro-b/startup-factory-$VERSION.tar.gz"

      - name: Verify byte-for-byte bundle reproducibility
        env:
          VERSION: ${{ steps.package.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cmp \
            "build/repro-a/startup-factory-$VERSION.tar.gz" \
            "build/repro-b/startup-factory-$VERSION.tar.gz"
          cmp \
            "build/repro-a/startup-factory-$VERSION.tar.gz.sha256" \
            "build/repro-b/startup-factory-$VERSION.tar.gz.sha256"
          (
            cd build/repro-a
            sha256sum --check "startup-factory-$VERSION.tar.gz.sha256"
          )
          (
            cd build/repro-b
            sha256sum --check "startup-factory-$VERSION.tar.gz.sha256"
          )

      - name: Prepare two clean package source trees
        env:
          VERSION: ${{ steps.package.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          for slot in a b; do
            package_tree="build/package-$slot"
            resource_dir="$package_tree/src/startup_factory_cli/resources"
            mkdir -p "$package_tree" "$resource_dir"
            git archive "$commit" | tar -x -C "$package_tree"
            cp \
              "build/repro-a/startup-factory-$VERSION.tar.gz" \
              "$resource_dir/startup-factory.tar.gz"
            (
              cd "$resource_dir"
              sha256sum startup-factory.tar.gz > startup-factory.tar.gz.sha256
            )
          done

      - name: Install the pinned build toolchain
        run: >-
          python -m pip install --disable-pip-version-check
          build==1.3.0 packaging==26.2 pyproject-hooks==1.2.0
          setuptools==83.0.0 wheel==0.47.0

      - name: Build wheel and sdist twice from clean trees
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          python -m build --no-isolation --outdir "$PWD/build/dist-a" "$PWD/build/package-a"
          python -m build --no-isolation --outdir "$PWD/build/dist-b" "$PWD/build/package-b"

      - name: Normalize sdist container metadata deterministically
        shell: bash
        run: |
          set -euo pipefail
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          python tests/packaging/test_packaging_metadata.py \
            --canonicalize-sdist build/dist-a/*.tar.gz "$source_date_epoch"
          python tests/packaging/test_packaging_metadata.py \
            --canonicalize-sdist build/dist-b/*.tar.gz "$source_date_epoch"

      - name: Prove distribution reproducibility and promote one set
        shell: bash
        run: |
          set -euo pipefail
          first=(build/dist-a/*)
          second=(build/dist-b/*)
          test "${#first[@]}" -eq 2
          test "${#second[@]}" -eq 2
          for artifact in "${first[@]}"; do
            name="$(basename "$artifact")"
            test -f "build/dist-b/$name"
            cmp "$artifact" "build/dist-b/$name"
          done
          mkdir -p dist
          cp build/dist-a/* dist/

      - name: Verify wheel and sdist bundle identity
        env:
          STARTUP_FACTORY_BUNDLE: ${{ github.workspace }}/build/repro-a/startup-factory-${{ steps.package.outputs.version }}.tar.gz
          STARTUP_FACTORY_DIST_DIR: ${{ github.workspace }}/dist
        run: python -m unittest discover -s tests/packaging -p "test_*.py" -v
